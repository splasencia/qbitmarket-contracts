name: Contracts V3 Audit Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/contracts-v3-audit-evidence.yml'
      - 'blockchain/contracts/**'
      - 'blockchain/test/**'
      - 'deployment/scripts/bundle_contracts.*'
      - 'docs/contracts-v3-*.md'
      - 'scripts/run_contracts_v3_*.sh'
      - 'scripts/check_contracts_v3_slither_triage.js'
      - 'scripts/generate_contracts_v3_audit_manifest.js'
  push:
    paths:
      - '.github/workflows/contracts-v3-audit-evidence.yml'
      - 'blockchain/contracts/**'
      - 'blockchain/test/**'
      - 'deployment/scripts/bundle_contracts.*'
      - 'docs/contracts-v3-*.md'
      - 'scripts/run_contracts_v3_*.sh'
      - 'scripts/check_contracts_v3_slither_triage.js'
      - 'scripts/generate_contracts_v3_audit_manifest.js'
  workflow_dispatch:

concurrency:
  group: contracts-v3-audit-evidence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AUDIT_EVIDENCE_DIR: /tmp/qbitmarket-contracts-v3-audit-evidence
      MYTHRIL_OUTPUT_DIR: /tmp/qbitmarket-contracts-v3-audit-evidence/mythril
      SLITHER_OUTPUT_DIR: /tmp/qbitmarket-contracts-v3-audit-evidence/slither
      MYTHRIL_DOCKER_IMAGE: mythril/myth
      MYTHRIL_SKIP_COMPILE: '1'
      PRIVATE_KEY: '0x1111111111111111111111111111111111111111111111111111111111111111'
      PRIVATE_KEY_QAN: '0x1111111111111111111111111111111111111111111111111111111111111111'
      TMPDIR: /tmp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install blockchain dependencies
        working-directory: blockchain
        run: npm ci

      - name: Install Slither
        run: |
          python -m pip install slither-analyzer==0.11.5
          solc-select install 0.8.28
          solc-select use 0.8.28

      - name: Record tool versions
        run: |
          mkdir -p "${AUDIT_EVIDENCE_DIR}"
          {
            echo "node=$(node --version)"
            echo "npm=$(npm --version)"
            echo "hardhat=$(cd blockchain && npx hardhat --version)"
            echo "slither=$(slither --version)"
            echo "docker=$(docker --version)"
            echo "mythril=$(docker run --rm ${MYTHRIL_DOCKER_IMAGE} version)"
          } > "${AUDIT_EVIDENCE_DIR}/tool-versions.txt"

      - name: Compile contracts
        working-directory: blockchain
        run: npx hardhat compile

      - name: Run release test suite
        working-directory: blockchain
        run: npx hardhat test

      - name: Run Slither baseline
        env:
          SLITHER_ALLOW_FINDINGS: '1'
        run: scripts/run_contracts_v3_slither.sh

      - name: Check Slither triage gate
        run: |
          node scripts/check_contracts_v3_slither_triage.js \
            --reports-dir "${SLITHER_OUTPUT_DIR}" \
            --output "${AUDIT_EVIDENCE_DIR}/slither-triage-gate.json"

      - name: Run Mythril symbolic baseline
        run: scripts/run_contracts_v3_mythril.sh

      - name: Generate audit evidence manifest
        run: |
          node scripts/generate_contracts_v3_audit_manifest.js \
            --output "${AUDIT_EVIDENCE_DIR}/audit-evidence-manifest.json" \
            --summary-output "${AUDIT_EVIDENCE_DIR}/audit-evidence-summary.md"

          cp docs/contracts-v3-audit-triage.md "${AUDIT_EVIDENCE_DIR}/contracts-v3-audit-triage.md"
          cp docs/contracts-v3-slither-accepted-findings.json "${AUDIT_EVIDENCE_DIR}/contracts-v3-slither-accepted-findings.json"
          cp docs/contracts-v3-operational-authority.md "${AUDIT_EVIDENCE_DIR}/contracts-v3-operational-authority.md"
          cp docs/contracts-v3-roadmap.md "${AUDIT_EVIDENCE_DIR}/contracts-v3-roadmap.md"
          cp docs/contracts-v3-publication-model.md "${AUDIT_EVIDENCE_DIR}/contracts-v3-publication-model.md"

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-v3-audit-evidence
          if-no-files-found: warn
          path: /tmp/qbitmarket-contracts-v3-audit-evidence
