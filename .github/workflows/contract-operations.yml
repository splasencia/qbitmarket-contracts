name: Contract Operations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected deployment environment and state namespace
        required: true
        default: dev
        type: choice
        options:
          - dev
          - preview
          - prd
      deployOnly:
        description: Optional comma-separated DEPLOY_ONLY target list for deploy runs
        required: false
        default: MarketplacePrimaryUpgradeable
        type: string
      collectionFactoryMarketplaceMode:
        description: CollectionFactory marketplace target mode during deploy runs
        required: true
        default: legacy
        type: choice
        options:
          - legacy
          - primary_proxy
      verificationContract:
        description: Optional verification manifest alias filter
        required: false
        type: string

concurrency:
  group: contract-operations-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment }}
      DEPLOY_ONLY_INPUT: ${{ inputs.deployOnly }}
      COLLECTION_FACTORY_MARKETPLACE_MODE: ${{ inputs.collectionFactoryMarketplaceMode }}
      VERIFICATION_CONTRACT: ${{ inputs.verificationContract }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate operation inputs
        env:
          DEPLOYER_ADDRESS: ${{ vars.DEPLOYER_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ vars.RPC_URL }}
        run: |
          set -eu

          for required_name in DEPLOYER_ADDRESS PRIVATE_KEY RPC_URL; do
            required_value="$(printenv "${required_name}" || true)"
            if [ -z "${required_value}" ]; then
              echo "Missing required environment value: ${required_name}" >&2
              exit 1
            fi
          done

      - name: Build deployment image
        run: docker build -t qbitmarket-contract-deployment ./deployment

      - name: Prepare deployment environment file
        id: prepare-env
        env:
          DEPLOYER_ADDRESS: ${{ vars.DEPLOYER_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ vars.RPC_URL }}
          MARKETPLACE_OWNER_ADDRESS: ${{ vars.MARKETPLACE_OWNER_ADDRESS }}
          MARKETPLACE_V2_OWNER_ADDRESS: ${{ vars.MARKETPLACE_V2_OWNER_ADDRESS }}
          FACTORY_OWNER_ADDRESS: ${{ vars.FACTORY_OWNER_ADDRESS }}
          FEE_RECIPIENT_ADDRESS: ${{ vars.FEE_RECIPIENT_ADDRESS }}
          MARKETPLACE_V2_FEE_RECIPIENT_ADDRESS: ${{ vars.MARKETPLACE_V2_FEE_RECIPIENT_ADDRESS }}
          MARKETPLACE_V2_SITE_NATIVE_TOKEN_ADDRESS: ${{ vars.MARKETPLACE_V2_SITE_NATIVE_TOKEN_ADDRESS }}
          MARKETPLACE_PLATFORM_FEE_BPS: ${{ vars.MARKETPLACE_PLATFORM_FEE_BPS }}
          MARKETPLACE_V2_PLATFORM_FEE_BPS: ${{ vars.MARKETPLACE_V2_PLATFORM_FEE_BPS }}
          MARKETPLACE_V2_SITE_NATIVE_TOKEN_FEE_BPS: ${{ vars.MARKETPLACE_V2_SITE_NATIVE_TOKEN_FEE_BPS }}
          EVM_VERSION: ${{ vars.EVM_VERSION }}
          NETWORK_NAME: ${{ vars.NETWORK_NAME }}
        run: |
          set -eu

          state_dir="/workspace/deployment/state/${ENVIRONMENT_NAME}"
          contracts_dir="/contracts/${ENVIRONMENT_NAME}/bundled_contracts"
          abi_dir="/contracts/abis"
          env_file="${RUNNER_TEMP}/contract-operations-${ENVIRONMENT_NAME}.env"

          mkdir -p \
            "${GITHUB_WORKSPACE}/deployment/state/${ENVIRONMENT_NAME}" \
            "${GITHUB_WORKSPACE}/blockchain/contracts/${ENVIRONMENT_NAME}" \
            "${GITHUB_WORKSPACE}/blockchain/contracts/abis"

          write_env() {
            key="$1"
            value="$2"
            if [ -n "${value}" ]; then
              printf '%s=%s\n' "${key}" "${value}" >> "${env_file}"
            fi
          }

          : > "${env_file}"

          write_env "QBITMARKET_ENV" "${ENVIRONMENT_NAME}"
          write_env "CONTRACTS_DIR" "${contracts_dir}"
          write_env "ABI_DIR" "${abi_dir}"
          write_env "MODULES_DIR" "/app/node_modules"
          write_env "ADDRESSBOOK_DIR" "${state_dir}"
          write_env "VERIFICATION_MANIFEST_PATH" "${state_dir}/verification-manifest.json"
          write_env "COLLECTION_FACTORY_MARKETPLACE_MODE" "${COLLECTION_FACTORY_MARKETPLACE_MODE}"
          write_env "EVM_VERSION" "${EVM_VERSION:-paris}"
          write_env "NETWORK_NAME" "${NETWORK_NAME:-}"
          write_env "MARKETPLACE_PLATFORM_FEE_BPS" "${MARKETPLACE_PLATFORM_FEE_BPS:-250}"
          write_env "MARKETPLACE_V2_PLATFORM_FEE_BPS" "${MARKETPLACE_V2_PLATFORM_FEE_BPS:-250}"
          write_env "DEPLOYER_ADDRESS" "${DEPLOYER_ADDRESS:-}"
          write_env "PRIVATE_KEY" "${PRIVATE_KEY:-}"
          write_env "RPC_URL" "${RPC_URL:-}"
          write_env "MARKETPLACE_OWNER_ADDRESS" "${MARKETPLACE_OWNER_ADDRESS:-}"
          write_env "MARKETPLACE_V2_OWNER_ADDRESS" "${MARKETPLACE_V2_OWNER_ADDRESS:-}"
          write_env "FACTORY_OWNER_ADDRESS" "${FACTORY_OWNER_ADDRESS:-}"
          write_env "FEE_RECIPIENT_ADDRESS" "${FEE_RECIPIENT_ADDRESS:-}"
          write_env "MARKETPLACE_V2_FEE_RECIPIENT_ADDRESS" "${MARKETPLACE_V2_FEE_RECIPIENT_ADDRESS:-}"
          write_env "MARKETPLACE_V2_SITE_NATIVE_TOKEN_ADDRESS" "${MARKETPLACE_V2_SITE_NATIVE_TOKEN_ADDRESS:-}"
          write_env "MARKETPLACE_V2_SITE_NATIVE_TOKEN_FEE_BPS" "${MARKETPLACE_V2_SITE_NATIVE_TOKEN_FEE_BPS:-}"

          if [ -n "${DEPLOY_ONLY_INPUT}" ]; then
            write_env "DEPLOY_ONLY" "${DEPLOY_ONLY_INPUT}"
          fi

          echo "env_file=${env_file}" >> "${GITHUB_OUTPUT}"

      - name: Run contract deployment
        run: |
          set -eu

          docker run --rm \
            --env-file "${{ steps.prepare-env.outputs.env_file }}" \
            --env VERIFICATION_CONTRACT="${VERIFICATION_CONTRACT}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${GITHUB_WORKSPACE}/blockchain/contracts:/contracts" \
            --entrypoint bash \
            qbitmarket-contract-deployment \
            -lc '
              set -euo pipefail

              describe_manifest() {
                if [ -n "${VERIFICATION_CONTRACT:-}" ]; then
                  node /app/describe_verification.js --contract "${VERIFICATION_CONTRACT}" --json
                else
                  node /app/describe_verification.js --json
                fi
              }

              /app/scripts/bundle_contracts.sh
              node /app/deploy.js
              describe_manifest
            '

      - name: Upload deployment state artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: contract-${{ inputs.environment }}-deploy-state
          if-no-files-found: warn
          path: |
            deployment/state/${{ inputs.environment }}/address-book.yml
            deployment/state/${{ inputs.environment }}/verification-manifest.json
